spring:
  application:
    name: Manhaji

  datasource:
    url: jdbc:mysql://localhost:3306/menhaji?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate: when Flyway finds an existing DB with no schema history
    # (i.e. the DB was created by ddl-auto:update before Flyway was introduced),
    # it creates the history table and marks baseline-version as already applied
    # without executing it. Migrations AFTER baseline-version run normally.
    baseline-on-migrate: true
    # V1–V4 represent the schema that already exists in production.
    # Only V5+ will run against the live DB. A fresh DB runs all versions.
    baseline-version: 4

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

app:
  jwt:
    secret: ${MANHAJI_JWT_SECRET:bWFuaGFqaS1kZXYtb25seS1zZWNyZXQtY2hhbmdlLWluLXByb2R1Y3Rpb24tcGxlYXNlLW5vdy0xMjM=}
    access-token-expiration: 86400000
    refresh-token-expiration: 604800000

  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:not-set}
      model: ${GEMINI_MODEL:gemini-2.5-flash}

    whisper:
      api-key: unused

    google-tts:
      api-key: ${GOOGLE_TTS_API_KEY:not-set}

    tts-provider: ${MANHAJI_TTS_PROVIDER:edge}

    edge-tts:
      python-path: /usr/bin/python3
      voice-arabic: ${MANHAJI_TTS_VOICE_AR:ar-JO-SanaNeural}
      voice-english: ${MANHAJI_TTS_VOICE_EN:en-US-AriaNeural}
      timeout-seconds: 20

  storage:
    upload-dir: ./uploads
    audio-dir: ./uploads/audio
    image-dir: ./uploads/images

  quiz:
    points-per-correct: 10
    mastery-threshold: 80.0
    completion-threshold: 50.0
    max-hint-level: 3
    adaptive-question-count: 10
    adaptive-weak-skill-threshold: 60.0
    max-hints-per-question: 3
    max-hints-per-attempt: 10
    adaptive-fallback-enabled: true

manhaji:
  curriculum:
    reseed: false

logging:
  level:
    "[com.springboot.manhaji]": DEBUG
    "[org.hibernate.SQL]": DEBUG